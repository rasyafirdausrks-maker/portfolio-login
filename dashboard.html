<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Dashboard</h2>

    <h3>Selamat Datang, Admin</h3>

    <div id="clock"></div>

    <button onclick="toggleDarkMode()">
        Dark Mode
    </button>

    <hr>

    <h3>Profil Saya</h3>

    <img src="https://via.placeholder.com/100" width="100">

    <p>Nama: Admin</p>
    <p>Email: admin@gmail.com</p>

    <hr>

    <h3>Upload File</h3>

    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>

    <ul id="fileList"></ul>

    <hr>

    <h3>Galeri Foto</h3>

    <input type="file"
           id="imageInput"
           accept="image/*">

    <button onclick="showImage()">
        Tampilkan Foto
    </button>

    <br><br>

    <img id="previewImage"
         width="250">

    <hr>

    <h3>Catatan Saya</h3>

    <input type="text"
           id="noteInput"
           placeholder="Tulis catatan...">

    <button onclick="addNote()">
        Tambah Catatan
    </button>

    <ul id="noteList"></ul>

    <hr>

    <button onclick="logout()">
        Logout
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
